name: Sync to Public

on:
  # Triggers when release-please publishes a release on the private repo.
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    # Safety guard: only run in the private repo so that even though this
    # workflow file gets mirrored to test-public-csda, it won't execute there.
    if: github.repository == 'vperekadan/test-private-csda'

    steps:
      # Generate a short-lived installation token scoped to both repos.
      # The token is automatically revoked at the end of this job.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            test-private-csda
            test-public-csda

      # Full history (fetch-depth: 0) is required to preserve all commits and
      # tags when pushing to the public repo.
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: main

      # Mirrors the full commit history and tags to the public repo.
      # --force handles the first-run case where the public repo was initialized
      # with its own commits. Subsequent pushes are clean fast-forwards.
      - name: Push full history to public repo
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote add public \
            https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository_owner }}/test-public-csda.git
          git push public HEAD:main --follow-tags --force

      # Creates the same release on the public repo using the title and notes
      # from the release-please release that triggered this workflow.
      # The tag is already present on the public repo from --follow-tags above.
      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          printf '%s' "$RELEASE_BODY" > release-notes.md
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md \
            --repo ${{ github.repository_owner }}/test-public-csda

